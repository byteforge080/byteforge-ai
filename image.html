<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ByteForge AI Image Generator</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#040814;
color:white;
min-height:100vh;
padding:40px;
overflow-x:hidden;
}

.background{
position:fixed;
width:700px;
height:700px;
background:#2563eb;
filter:blur(200px);
opacity:0.25;
top:-250px;
right:-250px;
z-index:-1;
}

.container{
max-width:1400px;
margin:auto;
}

.header{
text-align:center;
margin-bottom:50px;
}

.header h1{
font-size:55px;
margin-bottom:15px;
}

.header p{
max-width:750px;
margin:auto;
line-height:1.8;
color:#cbd5e1;
}

.generator-box{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(14px);
padding:35px;
border-radius:30px;
box-shadow:0 0 50px rgba(37,99,235,0.2);
}

.input-group{
display:flex;
gap:20px;
flex-wrap:wrap;
}

input,
select{
flex:1;
padding:16px;
border:none;
border-radius:14px;
background:#111827;
color:white;
font-size:15px;
outline:none;
min-width:250px;
}

button{
padding:16px 28px;
border:none;
border-radius:14px;
background:#2563eb;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:translateY(-4px);
}

.back-btn{
margin-top:20px;
background:transparent;
border:1px solid #60a5fa;
}

.gallery{
margin-top:50px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:25px;
}

.image-card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
border-radius:22px;
overflow:hidden;
transition:0.3s;
}

.image-card:hover{
transform:translateY(-8px);
}

.image-card img{
width:100%;
height:320px;
object-fit:cover;
display:block;
}

.image-info{
padding:18px;
}

.image-info p{
line-height:1.7;
color:#cbd5e1;
}

.loading{
margin-top:40px;
text-align:center;
font-size:20px;
color:#60a5fa;
display:none;
}

.quick-prompts{
margin-top:40px;
display:flex;
gap:15px;
flex-wrap:wrap;
}

.quick-prompts button{
background:#111827;
border:1px solid rgba(255,255,255,0.1);
font-size:14px;
}

@media(max-width:700px){

.header h1{
font-size:40px;
}

}

</style>
</head>

<body>

<div class="background"></div>

<div class="container">

<div class="header">

<h1>🖼 AI Image Generator</h1>

<p>
Generate futuristic AI images instantly using prompts,
creative imagination and advanced AI visual generation.
</p>

</div>

<div class="generator-box">

<div class="input-group">

<input type="text" id="prompt"
placeholder="Enter futuristic AI image prompt">

<select id="style">

<option>Cyberpunk</option>
<option>Realistic</option>
<option>Anime</option>
<option>3D Render</option>
<option>Fantasy</option>
<option>Sci-Fi</option>

</select>

<button onclick="generateImage()">
Generate Image
</button>

</div>

<div class="quick-prompts">

<button onclick="setPrompt('Futuristic cyberpunk city with neon lights')">
Cyberpunk City
</button>

<button onclick="setPrompt('Advanced AI robot standing in space')">
AI Robot
</button>

<button onclick="setPrompt('Luxury futuristic gaming room with holograms')">
Gaming Room
</button>

<button onclick="setPrompt('Galaxy themed developer workspace')">
Galaxy Workspace
</button>

</div>

<div class="loading" id="loading">
Generating AI Image...
</div>

<div class="gallery" id="gallery"></div>

<button class="back-btn" onclick="goBack()">
⬅ Back To Dashboard
</button>

</div>

</div>

<script>

function setPrompt(text){

document.getElementById("prompt").value = text;

}

function generateImage(){
    generateAI();

let prompt =
document.getElementById("prompt").value;

let style =
document.getElementById("style").value;

if(prompt === ""){

alert("Please enter image prompt");

return;

}

document.getElementById("loading").style.display = "block";

let finalPrompt =
prompt + " " + style + " ultra detailed futuristic art";

let imageURL =
"https://image.pollinations.ai/prompt/" +
encodeURIComponent(finalPrompt) +
"?width=1024&height=1024&seed=" +
Math.floor(Math.random()*100000);

setTimeout(() => {

document.getElementById("loading").style.display = "none";

let gallery =
document.getElementById("gallery");

let card =
document.createElement("div");

card.classList.add("image-card");

card.innerHTML = `

<img 
src="${imageURL}" 
alt="AI Image"
onerror="this.src='https://placehold.co/600x400/111827/FFFFFF?text=Image+Generation+Failed'"
>

<div class="image-info">

<p>
${finalPrompt}
</p>

</div>

`;

gallery.prepend(card);

},1500);

}

function goBack(){

window.location.href = "index.html";

}

</script>
<script type="module">

import {
generateAI,
loadStats,
trackUser
}
from "./firebase.js";

trackUser();

loadStats();

window.generateAI = generateAI;

</script>
</body>
</html>
