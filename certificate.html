<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Certificate Portal - Coming Soon</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#040814;
overflow:hidden;
color:white;
text-align:center;
padding:20px;
}

.background{
position:fixed;
width:700px;
height:700px;
background:#2563eb;
filter:blur(220px);
opacity:0.25;
top:-250px;
right:-250px;
z-index:-1;
}

.container{
max-width:750px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(14px);
padding:60px 40px;
border-radius:30px;
box-shadow:0 0 50px rgba(37,99,235,0.25);
animation:fadeIn 1s ease;
}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.icon{
font-size:90px;
margin-bottom:25px;
animation:float 3s ease-in-out infinite;
}

@keyframes float{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-12px);
}

100%{
transform:translateY(0px);
}

}

h1{
font-size:60px;
margin-bottom:15px;
}

h1 span{
color:#60a5fa;
}

p{
font-size:18px;
line-height:1.9;
color:#cbd5e1;
margin-top:20px;
}

button{
margin-top:35px;
padding:16px 32px;
border:none;
border-radius:14px;
background:#2563eb;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:translateY(-5px);
}

.small-text{
margin-top:30px;
font-size:14px;
opacity:0.7;
}

@media(max-width:700px){

h1{
font-size:42px;
}

.icon{
font-size:70px;
}

}

</style>
</head>

<body>

<div class="background"></div>

<div class="container">

<div class="icon">
🏆
</div>

<h1>
Coming <span>Soon!</span>
</h1>

<p>
The futuristic ByteForge Certificate Portal is currently under development.
Soon you will be able to generate professional certificates,
verify achievements and download premium designs instantly.
</p>

<button onclick="goBack()">
⬅ Back To Dashboard
</button>

<div class="small-text">
ByteForge AI © 2026 • Forge The Future Together
</div>

</div>

<script>

function goBack(){

window.location.href = "index.html";

}

</script>

</body>
</html>
