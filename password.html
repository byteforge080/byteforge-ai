<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ByteForge Password Generator</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#040814;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.background{
position:fixed;
width:600px;
height:600px;
background:#2563eb;
filter:blur(180px);
opacity:0.25;
top:-200px;
right:-200px;
z-index:-1;
}

.container{
width:90%;
max-width:500px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(12px);
padding:40px;
border-radius:25px;
box-shadow:0 0 40px rgba(37,99,235,0.3);
text-align:center;
}

.container h1{
font-size:40px;
margin-bottom:15px;
}

.container p{
color:#cbd5e1;
margin-bottom:30px;
line-height:1.7;
}

input{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#111827;
color:white;
font-size:16px;
margin-bottom:20px;
outline:none;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:translateY(-4px);
}

.result-box{
margin-top:30px;
background:#111827;
padding:20px;
border-radius:16px;
word-break:break-all;
}

.result-box h3{
color:#60a5fa;
margin-bottom:10px;
}

#password{
font-size:18px;
line-height:1.7;
}

.copy-btn{
margin-top:15px;
background:#0f172a;
}

.copy-btn:hover{
background:#1e293b;
}

.back-btn{
margin-top:15px;
background:transparent;
border:1px solid #60a5fa;
}

</style>
</head>

<body>

<div class="background"></div>

<div class="container">

<h1>🔐 Password Generator</h1>

<p>
Generate powerful futuristic passwords instantly using ByteForge AI tools.
</p>

<input type="number" id="length" placeholder="Enter Password Length">

<button onclick="generatePassword()">
Generate Password
</button>

<div class="result-box">

<h3>Your Password</h3>

<p id="password">
Click generate to create password
</p>

<button class="copy-btn" onclick="copyPassword()">
Copy Password
</button>

<button class="back-btn" onclick="goBack()">
⬅ Back To Dashboard
</button>

</div>

</div>

<script>

function generatePassword(){
    generateAI();

let chars =
"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%^&*()_+?><:{}[]";

let length =
document.getElementById("length").value;

if(length < 4){

alert("Password length should be at least 4");

return;
}

let password = "";

for(let i=0;i<length;i++){

let random =
Math.floor(Math.random()*chars.length);

password += chars[random];
}

document.getElementById("password").innerText =
password;

}

function copyPassword(){

let password =
document.getElementById("password").innerText;

navigator.clipboard.writeText(password);

alert("Password Copied");

}

function goBack(){

window.location.href = "index.html";

}

</script>

</body>
</html>
